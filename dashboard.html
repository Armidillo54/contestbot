<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContestBot Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e0e0e0;padding:20px}
.header{text-align:center;padding:30px 0;border-bottom:1px solid #1a1a2e}
.header h1{font-size:2.5em;background:linear-gradient(135deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:#888;margin-top:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:30px 0}
.stat-card{background:#12121f;border:1px solid #1a1a2e;border-radius:12px;padding:24px;text-align:center}
.stat-card .number{font-size:2.5em;font-weight:700;color:#00d4ff}
.stat-card .label{color:#888;margin-top:4px;font-size:0.9em}
.stat-card.prize .number{color:#00ff88}
.stat-card.entered .number{color:#ff6b6b}
.stat-card.scout .number{color:#7b2ff7}
.section{margin:30px 0}
.section h2{font-size:1.4em;margin-bottom:15px;color:#fff;display:flex;align-items:center;gap:8px}
.contest-table{width:100%;border-collapse:collapse;background:#12121f;border-radius:12px;overflow:hidden}
.contest-table th{background:#1a1a2e;padding:14px 16px;text-align:left;font-weight:600;color:#00d4ff;font-size:0.85em;text-transform:uppercase}
.contest-table td{padding:12px 16px;border-bottom:1px solid #1a1a2e}
.contest-table tr:hover{background:#1a1a2e}
.contest-table a{color:#00d4ff;text-decoration:none}
.contest-table a:hover{text-decoration:underline}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.75em;font-weight:600}
.badge-active{background:#00ff8820;color:#00ff88;border:1px solid #00ff8840}
.badge-expired{background:#ff6b6b20;color:#ff6b6b;border:1px solid #ff6b6b40}
.badge-unverified{background:#ffaa0020;color:#ffaa00;border:1px solid #ffaa0040}
.badge-daily{background:#00d4ff20;color:#00d4ff}
.badge-weekly{background:#7b2ff720;color:#7b2ff7}
.badge-single{background:#88888820;color:#aaa}
.prize-val{color:#00ff88;font-weight:700}
.log-box{background:#12121f;border:1px solid #1a1a2e;border-radius:12px;padding:20px;max-height:300px;overflow-y:auto;font-family:'SF Mono',monospace;font-size:0.85em;line-height:1.8;color:#888}
.log-box .success{color:#00ff88}
.log-box .fail{color:#ff6b6b}
.log-box .info{color:#00d4ff}
.controls{display:flex;gap:12px;margin:20px 0}
.btn{padding:10px 24px;border:none;border-radius:8px;font-size:0.9em;cursor:pointer;font-weight:600;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff}
.btn-primary:hover{opacity:0.85}
.btn-secondary{background:#1a1a2e;color:#e0e0e0;border:1px solid #333}
.btn-secondary:hover{background:#252540}
#status{margin:10px 0;padding:10px;border-radius:8px;display:none}
footer{text-align:center;padding:30px;color:#555;font-size:0.85em;border-top:1px solid #1a1a2e;margin-top:40px}
</style>
</head>
<body>
<div class="header">
  <h1>ContestBot</h1>
  <p>Automated Canadian NPN Contest Entry System</p>
</div>

<div class="stats" id="stats">
  <div class="stat-card"><div class="number" id="totalActive">--</div><div class="label">Active Contests</div></div>
  <div class="stat-card prize"><div class="number" id="totalPrize">--</div><div class="label">Total Prize Value</div></div>
  <div class="stat-card entered"><div class="number" id="totalEntered">--</div><div class="label">Entered Today</div></div>
  <div class="stat-card scout"><div class="number" id="totalScout">--</div><div class="label">AI Discovered</div></div>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="loadData()">Refresh Data</button>
  <button class="btn btn-secondary" onclick="filterTable('active')">Active Only</button>
  <button class="btn btn-secondary" onclick="filterTable('all')">Show All</button>
</div>
<div id="status"></div>

<div class="section">
  <h2>Contest Database</h2>
  <table class="contest-table" id="contestTable">
    <thead><tr><th>Contest</th><th>Prize</th><th>Value</th><th>Frequency</th><th>Ends</th><th>Source</th><th>Status</th></tr></thead>
    <tbody id="contestBody"></tbody>
  </table>
</div>

<div class="section">
  <h2>Activity Log</h2>
  <div class="log-box" id="logBox">Loading...</div>
</div>

<footer>ContestBot v1.0 | Orillia, Ontario | NPN Only</footer>

<script>
let allContests = [];

async function loadData() {
  try {
    // Load from local files (when running locally) or from GitHub raw
    const dbResp = await fetch('contests_database.json');
    const db = await dbResp.json();
    allContests = db.contests || [];
    
    const active = allContests.filter(c => c.status === 'active');
    const entered = allContests.filter(c => c.last_entered === new Date().toISOString().split('T')[0]);
    const scout = allContests.filter(c => c.source === 'perplexity_ai');
    
    document.getElementById('totalActive').textContent = active.length;
    document.getElementById('totalPrize').textContent = '$' + (db.total_prize_value || 0).toLocaleString();
    document.getElementById('totalEntered').textContent = entered.length;
    document.getElementById('totalScout').textContent = scout.length;
    
    renderTable(allContests);
    
    // Try loading entry log
    try {
      const logResp = await fetch('entry_log.json');
      const log = await logResp.json();
      renderLog(log);
    } catch(e) {
      document.getElementById('logBox').innerHTML = '<span class="info">No entry log yet. Run entry_bot.py to start.</span>';
    }
  } catch(e) {
    document.getElementById('status').style.display = 'block';
    document.getElementById('status').style.background = '#ff6b6b20';
    document.getElementById('status').textContent = 'Error loading data: ' + e.message;
  }
}

function renderTable(contests) {
  const tbody = document.getElementById('contestBody');
  tbody.innerHTML = contests.sort((a,b) => (b.prize_value||0) - (a.prize_value||0)).map(c => {
    const statusClass = c.status === 'active' ? 'badge-active' : c.status === 'expired' ? 'badge-expired' : 'badge-unverified';
    const freqClass = c.entry_frequency === 'daily' ? 'badge-daily' : c.entry_frequency === 'weekly' ? 'badge-weekly' : 'badge-single';
    return `<tr>
      <td><a href="${c.url}" target="_blank">${c.name}</a></td>
      <td>${c.prize || '--'}</td>
      <td class="prize-val">$${(c.prize_value||0).toLocaleString()}</td>
      <td><span class="badge ${freqClass}">${c.entry_frequency||'--'}</span></td>
      <td>${c.end_date||'--'}</td>
      <td>${c.source||'--'}</td>
      <td><span class="badge ${statusClass}">${c.status}</span></td>
    </tr>`;
  }).join('');
}

function renderLog(log) {
  const box = document.getElementById('logBox');
  box.innerHTML = log.slice(-20).reverse().map(e => {
    const cls = e.status === 'submitted' ? 'success' : 'fail';
    return `<div class="${cls}">[${e.timestamp}] ${e.contest_name} - ${e.status} (${e.fields_filled} fields)</div>`;
  }).join('');
}

function filterTable(type) {
  if (type === 'active') renderTable(allContests.filter(c => c.status === 'active'));
  else renderTable(allContests);
}

loadData();
</script>
</body>
</html>
