name: ContestBot Daily Scraper

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-contests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run contest scraper
        run: python contest_scraper.py

      - name: Run compliance check
        run: python run_compliance.py

      - name: Commit updated database
        run: |
          git config user.name 'ContestBot'
          git config user.email 'contestbot@users.noreply.github.com'
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update: $(date +%Y-%m-%d) scrape results"
          git push
