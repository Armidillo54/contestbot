name: ContestBot Daily Scraper

on:
  schedule:
    # 5:00 AM America/Toronto daily. EDT = 09:00 UTC (Mar-Nov), EST = 10:00 UTC (Nov-Mar).
    # Both crons are registered so the job fires once at 5:00 local.
    # The gate-time job below skips the off-DST one each day.
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/daily_scraper.yml'

permissions:
  contents: write

jobs:
  gate-time:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Trigger is ${{ github.event_name }} — proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/Toronto date +%H)
          if [ "$HOUR" = "05" ] || [ "$HOUR" = "06" ]; then
            echo "Toronto time is ${HOUR}:xx — within the 5 AM run window, proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Toronto hour is $HOUR, not 05 or 06 — skipping this DST-shifted cron."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  scrape-and-deploy:
    needs: gate-time
    if: needs.gate-time.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper pipeline
        run: python run_all.py

      - name: Commit updated database
        run: |
          git config user.name 'ContestBot'
          git config user.email 'contestbot@users.noreply.github.com'
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update: $(date +%Y-%m-%d) contest scan"
          git push
