name: ContestBot Daily Scraper

on:
  schedule:
    # Fire multiple times a day to survive GitHub Actions scheduled-cron
    # flakiness. Off-the-hour (:23) to dodge peak-minute contention.
    # If nothing has changed since the last run, the commit step is a no-op,
    # so redundant runs are safe.
    - cron: '23 9 * * *'   # 5:23 AM EDT (DST, Mar-Nov)
    - cron: '23 10 * * *'  # 5:23 AM EST (standard, Nov-Mar)
    - cron: '23 13 * * *'  # 9:23 AM EDT / 8:23 AM EST — morning safety net
    - cron: '23 17 * * *'  # 1:23 PM EDT / 12:23 PM EST — midday safety net
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/daily_scraper.yml'

permissions:
  contents: write

concurrency:
  group: contestbot-scraper
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper pipeline
        run: python run_all.py

      - name: Commit updated database
        run: |
          git config user.name 'ContestBot'
          git config user.email 'contestbot@users.noreply.github.com'
          git add -A
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "Auto-update: $(date -u +%Y-%m-%d) contest scan"
          git pull --rebase origin main
          git push
