name: ContestBot Daily Scraper

on:
  schedule:
    # Run daily at 12:00 UTC (8:00 AM EDT)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-contests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run contest scraper
        run: python contest_scraper.py

      - name: Run compliance check
        run: |
          python -c "
import json
from legal_compliance import filter_eligible_contests, generate_compliance_report
with open('contests_database.json') as f:
    db = json.load(f)
with open('config.json') as f:
    config = json.load(f)
report = generate_compliance_report(db, config)
print(f'Eligible contests today: {report["eligible_today"]}')
print(f'Total prize value: \${report["total_eligible_value"]:,}')
for c in report['contests']:
    print(f'  - {c["name"]} (\${c["prize_value"]:,}) ends {c["end_date"]}')
with open('compliance_report.json', 'w') as f:
    json.dump(report, f, indent=2)
"

      - name: Commit updated database
        run: |
          git config user.name 'ContestBot'
          git config user.email 'contestbot@users.noreply.github.com'
          git add contests_database.json compliance_report.json
          git diff --staged --quiet || git commit -m "Auto-update: $(date +%Y-%m-%d) scrape results"
          git push
