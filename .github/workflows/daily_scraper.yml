name: ContestBot Daily Scraper

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      USER_FIRST_NAME: ${{ secrets.USER_FIRST_NAME }}
      USER_LAST_NAME: ${{ secrets.USER_LAST_NAME }}
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PHONE: ${{ secrets.USER_PHONE }}
      USER_POSTAL_CODE: ${{ secrets.USER_POSTAL_CODE }}
      USER_DOB: ${{ secrets.USER_DOB }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python run_all.py

      - name: Commit updated database
        run: |
          git config user.name 'ContestBot'
          git config user.email 'contestbot@users.noreply.github.com'
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update: $(date +%Y-%m-%d) pipeline results"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
