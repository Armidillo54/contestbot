<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContestBot — Ontario Contests &amp; Freebies</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e0e0e0;padding:20px;max-width:1300px;margin:0 auto}
.header{text-align:center;padding:30px 0;border-bottom:1px solid #1a1a2e}
.header h1{font-size:2.4em;background:linear-gradient(135deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:#888;margin-top:6px}
.header .updated{color:#555;font-size:0.8em;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:22px 0}
.stat-card{background:#12121f;border:1px solid #1a1a2e;border-radius:12px;padding:18px;text-align:center}
.stat-card .number{font-size:2em;font-weight:700;color:#00d4ff}
.stat-card .label{color:#888;margin-top:4px;font-size:0.82em}
.stat-card.prize .number{color:#00ff88}
.stat-card.new .number{color:#ffaa00}
.stat-card.daily .number{color:#7b2ff7}
.stat-card.freebies .number{color:#ff69b4}
.section{margin:28px 0}
.tab-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.tab-btn{padding:8px 18px;border:1px solid #333;border-radius:8px;background:#12121f;color:#888;cursor:pointer;font-size:0.83em;font-weight:600;transition:all 0.2s}
.tab-btn.active{background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff;border-color:transparent}
.tab-btn:hover:not(.active){background:#1a1a2e;color:#fff}
.tab-btn.freebie-tab.active{background:linear-gradient(135deg,#ff69b4,#ff1493)}
.contest-table{width:100%;border-collapse:collapse;background:#12121f;border-radius:12px;overflow:hidden}
.contest-table th{background:#1a1a2e;padding:10px 12px;text-align:left;font-weight:600;color:#00d4ff;font-size:0.78em;text-transform:uppercase;white-space:nowrap}
.contest-table td{padding:9px 12px;border-bottom:1px solid #1a1a2e;font-size:0.88em;vertical-align:middle}
.contest-table tr:last-child td{border-bottom:none}
.contest-table tr:hover td{background:#1a1a2e}
.contest-table a{color:#00d4ff;text-decoration:none;font-weight:500}
.contest-table a:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.72em;font-weight:600;white-space:nowrap}
.badge-active{background:#00ff8820;color:#00ff88;border:1px solid #00ff8840}
.badge-expired{background:#ff6b6b20;color:#ff6b6b;border:1px solid #ff6b6b40}
.badge-daily{background:#7b2ff720;color:#a56ef7;border:1px solid #7b2ff740}
.badge-weekly{background:#00d4ff20;color:#00d4ff;border:1px solid #00d4ff40}
.badge-monthly{background:#ffaa0020;color:#ffaa00;border:1px solid #ffaa0040}
.badge-single{background:#88888820;color:#aaa;border:1px solid #88888840}
.badge-new{background:#ffaa0030;color:#ffaa00;border:1px solid #ffaa0060;margin-left:6px}
.prize-val{color:#00ff88;font-weight:700}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;flex-shrink:0}
.dot-ok{background:#00ff88}
.dot-dead{background:#ff6b6b}
.dot-unknown{background:#555}
.empty{text-align:center;padding:40px;color:#555;font-style:italic}
.source-tag{font-size:0.75em;color:#555}
footer{text-align:center;padding:22px;color:#444;font-size:0.78em;border-top:1px solid #1a1a2e;margin-top:36px}
@media(max-width:700px){
  .contest-table{font-size:0.82em}
  .contest-table th,.contest-table td{padding:7px 8px}
  .header h1{font-size:1.8em}
  .stats{grid-template-columns:repeat(2,1fr)}
  .tab-bar{gap:6px}
  .tab-btn{padding:7px 12px;font-size:0.78em}
}
</style>
</head>
<body>

<div class="header">
  <h1>ContestBot</h1>
  <p>Ontario Contests &amp; Canadian Freebies — Updated Daily</p>
  <div class="updated" id="lastUpdated">Loading...</div>
</div>

<div class="stats" id="stats">
  <div class="stat-card"><div class="number" id="totalActive">--</div><div class="label">Active Contests</div></div>
  <div class="stat-card prize"><div class="number" id="totalPrize">--</div><div class="label">Total Prize Pool</div></div>
  <div class="stat-card new"><div class="number" id="totalNew">--</div><div class="label">New Today</div></div>
  <div class="stat-card daily"><div class="number" id="totalDaily">--</div><div class="label">Daily Entry</div></div>
  <div class="stat-card freebies"><div class="number" id="totalFreebies">--</div><div class="label">Active Freebies</div></div>
</div>

<div class="section">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('all',this)">All Contests</button>
    <button class="tab-btn" onclick="showTab('new',this)">New Today</button>
    <button class="tab-btn" onclick="showTab('daily',this)">Daily Entry</button>
    <button class="tab-btn" onclick="showTab('highvalue',this)">High Value ($5k+)</button>
    <button class="tab-btn freebie-tab" onclick="showTab('freebies',this)">Freebies</button>
  </div>
  <table class="contest-table" id="contestTable">
    <thead id="tableHead"></thead>
    <tbody id="contestBody"></tbody>
  </table>
  <div class="empty" id="emptyMsg" style="display:none">No items in this category yet.</div>
</div>

<footer>ContestBot | Orillia, Ontario | Ontario-eligible NPN contests only | Updated daily at 8 AM ET</footer>

<script>
let allContests = [], allFreebies = [], currentTab = 'all';
const today = new Date().toISOString().split('T')[0];

function fmt(n){ return '$' + (n||0).toLocaleString(); }

function linkDot(entry){
  if(entry.link_valid === true)  return '<span class="dot dot-ok" title="Link verified"></span>';
  if(entry.link_valid === false) return '<span class="dot dot-dead" title="Dead link"></span>';
  return '<span class="dot dot-unknown" title="Not yet checked"></span>';
}

function freqBadge(f){
  const cls = f==='daily'?'badge-daily':f==='weekly'?'badge-weekly':f==='monthly'?'badge-monthly':'badge-single';
  return `<span class="badge ${cls}">${f||'single'}</span>`;
}

function isNew(entry){
  return entry.added_date === today || entry.discovered_date === today;
}

function renderContests(list){
  document.getElementById('tableHead').innerHTML =
    '<tr><th></th><th>Contest</th><th>Prize</th><th>Value</th><th>Frequency</th><th>Ends</th><th>Source</th></tr>';
  const tbody = document.getElementById('contestBody');
  const empty = document.getElementById('emptyMsg');
  if(!list.length){ tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  tbody.innerHTML = list
    .sort((a,b)=>(b.prize_value||0)-(a.prize_value||0))
    .map(c => {
      const newBadge = isNew(c) ? '<span class="badge badge-new">NEW</span>' : '';
      return `<tr>
        <td style="width:14px">${linkDot(c)}</td>
        <td><a href="${c.url}" target="_blank" rel="noopener">${c.name||'--'}</a>${newBadge}</td>
        <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.prize||'--'}</td>
        <td class="prize-val">${fmt(c.prize_value)}</td>
        <td>${freqBadge(c.entry_frequency)}</td>
        <td>${c.end_date||'--'}</td>
        <td class="source-tag">${c.source||'--'}</td>
      </tr>`;
    }).join('');
}

function renderFreebies(list){
  document.getElementById('tableHead').innerHTML =
    '<tr><th></th><th>Freebie</th><th>Description</th><th>Category</th><th>Expires</th><th>Source</th></tr>';
  const tbody = document.getElementById('contestBody');
  const empty = document.getElementById('emptyMsg');
  if(!list.length){ tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  tbody.innerHTML = list
    .sort((a,b)=>{ if(!a.expiry) return 1; if(!b.expiry) return -1; return a.expiry.localeCompare(b.expiry); })
    .map(f => {
      const newBadge = isNew(f) ? '<span class="badge badge-new">NEW</span>' : '';
      return `<tr>
        <td style="width:14px">${linkDot(f)}</td>
        <td><a href="${f.url}" target="_blank" rel="noopener">${f.name||'--'}</a>${newBadge}</td>
        <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.description||'--'}</td>
        <td><span class="badge badge-weekly">${f.category||'--'}</span></td>
        <td>${f.expiry||'ongoing'}</td>
        <td class="source-tag">${f.source||'--'}</td>
      </tr>`;
    }).join('');
}

function activeContests(){
  // Exclude dead links, expired, and entries whose URL hasn't been resolved yet
  // (url_resolved===false means the resolver tried but couldn't find a direct link)
  return allContests.filter(c =>
    c.status === 'active' &&
    c.link_valid !== false &&
    c.url_resolved !== false
  );
}

function activeFreebies(){
  return allFreebies.filter(f =>
    f.status === 'active' &&
    f.link_valid !== false &&
    f.url_resolved !== false
  );
}

function showTab(t, btn){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  currentTab = t;
  const ac = activeContests();
  if(t === 'all')       renderContests(ac);
  else if(t === 'new')  renderContests(ac.filter(isNew));
  else if(t === 'daily') renderContests(ac.filter(c => c.entry_frequency === 'daily'));
  else if(t === 'highvalue') renderContests(ac.filter(c => (c.prize_value||0) >= 5000));
  else if(t === 'freebies') renderFreebies(activeFreebies());
}

async function loadData(){
  try{
    const [cr, fr] = await Promise.all([
      fetch('contests_database.json').then(r=>r.json()).catch(()=>({contests:[]})),
      fetch('freebies_database.json').then(r=>r.json()).catch(()=>({freebies:[]}))
    ]);
    allContests = (cr.contests||[]).filter(c => c.name && c.name.length > 3 && c.url);
    allFreebies = (fr.freebies||[]).filter(f => f.name && f.url);

    const ac = activeContests();
    const af = activeFreebies();
    const newContests = ac.filter(isNew);
    const daily = ac.filter(c => c.entry_frequency === 'daily');

    document.getElementById('totalActive').textContent = ac.length;
    document.getElementById('totalPrize').textContent = fmt(ac.reduce((s,c)=>s+(c.prize_value||0),0));
    document.getElementById('totalNew').textContent = newContests.length + af.filter(isNew).length;
    document.getElementById('totalDaily').textContent = daily.length;
    document.getElementById('totalFreebies').textContent = af.length;
    document.getElementById('lastUpdated').textContent = 'Last updated: ' + (cr.last_updated || today);

    renderContests(ac);
  } catch(e){
    document.getElementById('lastUpdated').textContent = 'Error loading data: ' + e.message;
  }
}

loadData();
</script>
</body>
</html>
